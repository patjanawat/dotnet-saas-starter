services:
  postgres:
    image: postgres:16
    container_name: saas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: saasdb
      POSTGRES_USER: saas
      POSTGRES_PASSWORD: saas_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saas -d saasdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: src/SaaS.Api/Dockerfile
    container_name: saas-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Database__UseInMemory: "false"
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=saasdb;Username=saas;Password=saas_dev_password
    ports:
      - "5000:8080"

volumes:
  postgres-data:
